name: Sync to GitHub

on:
    push:
        branches:
            - main

concurrency:
    group: sync-to-github
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    mirror:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout main
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  ref: main
                  fetch-depth: 0
                  persist-credentials: false

            - name: Push main to GitHub
              env:
                  GH_PAT: ${{ secrets.GH_PAT }}
              run: git push "https://x-access-token:${GH_PAT}@github.com/temmiland/react-fileicons.git" main:main
