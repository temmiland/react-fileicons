name: Auditing

on:
    workflow_dispatch:
    schedule:
        - cron: "00 00 * * 1"
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    npm-audit:
        name: npm audit
        runs-on: ubuntu-latest
        outputs:
            found: ${{ steps.audit.outputs.found }}
            summary: ${{ steps.audit.outputs.summary }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Use Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: 24.x

            - name: Install dependencies
              run: cd react-fileicons && npm ci

            - name: Run npm audit
              id: audit
              run: |
                  set +e
                  OUTPUT=$(cd react-fileicons && npm audit 2>&1)
                  EXIT_CODE=$?
                  set -e
                  echo "$OUTPUT"

                  DELIM="EOF_$(openssl rand -hex 8)"
                  {
                      echo "summary<<$DELIM"
                      echo "$OUTPUT"
                      echo "$DELIM"
                  } >> "$GITHUB_OUTPUT"

                  if [ "$EXIT_CODE" -ne 0 ]; then
                      echo "found=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "found=false" >> "$GITHUB_OUTPUT"
                  fi

    # Opens (or updates) a single tracking issue instead of spamming a new one
    # per run. Needs the repo's Actions setting "Read and write permissions"
    # enabled so the built-in token can create issues.
    report:
        needs: npm-audit
        if: always() && needs.npm-audit.outputs.found == 'true'
        runs-on: ubuntu-latest
        permissions:
            issues: write
        steps:
            - name: Create or update security issue
              env:
                  GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
                  API_URL: ${{ gitea.api_url }}
                  REPO: ${{ gitea.repository }}
                  RUN_URL: ${{ gitea.server_url }}/${{ gitea.repository }}/actions/runs/${{ gitea.run_id }}
                  SUMMARY: ${{ needs.npm-audit.outputs.summary }}
              run: |
                  TITLE="npm audit: offene Funde"

                  BODY="Automatisch erkannte Sicherheitsfunde vom $(date -u +'%Y-%m-%d %H:%M UTC') ([Lauf]($RUN_URL)).

                  \`\`\`
                  $SUMMARY
                  \`\`\`"

                  EXISTING=$(curl -s -H "Authorization: token $GITEA_TOKEN" \
                      "$API_URL/repos/$REPO/issues?state=open&type=issues&limit=50" \
                      | jq -r --arg t "$TITLE" '[.[] | select(.title == $t)] | .[0].number // empty')

                  if [ -n "$EXISTING" ]; then
                      echo "Updating issue #$EXISTING"
                      jq -n --arg body "$BODY" '{body: $body}' \
                          | curl -s -X PATCH -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" \
                              "$API_URL/repos/$REPO/issues/$EXISTING" -d @-
                      jq -n --arg body "**Neuer Scan mit offenen Funden:**

                  $BODY" '{body: $body}' \
                          | curl -s -X POST -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" \
                              "$API_URL/repos/$REPO/issues/$EXISTING/comments" -d @-
                  else
                      echo "Creating new issue"
                      jq -n --arg title "$TITLE" --arg body "$BODY" '{title: $title, body: $body}' \
                          | curl -s -X POST -H "Authorization: token $GITEA_TOKEN" -H "Content-Type: application/json" \
                              "$API_URL/repos/$REPO/issues" -d @-
                  fi
